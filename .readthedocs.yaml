# .readthedocs.yaml
# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

# Required
version: 2

# Set the version of Python and other tools you might need
build:
  os: ubuntu-22.04
  tools:
    python: "3.11"
    # You can also specify nodejs, rust, or go if your docs need them

# Build documentation in the "docs" directory with Sphinx
sphinx:
  configuration: docs/conf.py

# If you use MkDocs instead of Sphinx, uncomment this and comment the sphinx block above:
# mkdocs:
#   configuration: mkdocs.yml

# Declare the Python requirements needed to build your docs
python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - docs
    # Alternatively, if you have a requirements file:
    # - requirements: docs/requirements.txt

# Build formats other than HTML (optional)
formats:
  - pdf
  - epub
